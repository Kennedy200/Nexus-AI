<section id="contact" class="section-container bg-light-alt">
    <div class="container text-center">
        <h2 class="section-title">Get in Touch</h2>
        <p class="section-subtitle">Have questions about our backend API or enterprise pricing? Send us a message.</p>
        
        <form class="contact-form">
            <div class="input-group">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
            </div>
            <input type="text" placeholder="Subject" required>
            <textarea placeholder="How can we help you?" rows="5" required></textarea>
            <button type="submit" class="primary-btn w-full">Send Message</button>
        </form>
    </div>
</section>
